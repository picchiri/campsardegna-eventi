name: CampSardegna – Aggiorna Eventi Sardegna


on:
  schedule:
    # 06:00 UTC = 08:00 ora italiana (CET/CEST)
    - cron: '0 6 * * *'
  # Avvio manuale dal tab Actions
  workflow_dispatch:

jobs:
  aggiorna-eventi:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installa dipendenze
        run: cd scripts && npm install

      - name: Leggi feed RSS e aggiorna WordPress
        env:
          WP_URL:      ${{ secrets.WP_URL }}
          WP_USER:     ${{ secrets.WP_USER }}
          WP_APP_PASS: ${{ secrets.WP_APP_PASS }}
          WP_PAGE_ID:  ${{ secrets.WP_PAGE_ID }}
        run: cd scripts && node fetch-eventi.js
